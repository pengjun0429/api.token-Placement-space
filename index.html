<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Pro | 終極避錯版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --primary: #38bdf8; --success: #10b981; --error: #fb7185; --card: rgba(15, 23, 42, 0.7); }
        body { background: radial-gradient(circle at top right, #1e1b4b, #020617); color: #f1f5f9; font-family: system-ui, sans-serif; min-height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; }
        .glass-panel { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; padding: 35px; width: 90%; max-width: 500px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); }
        #mainApp, #initWall { display: none; }
        h1 { font-size: 1.8rem; margin: 0 0 0.5rem 0; text-align: center; }
        .subtitle { text-align: center; color: #94a3b8; font-size: 0.85rem; margin-bottom: 2rem; }
        .input-box { width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 14px; padding: 12px 16px; color: white; margin-bottom: 12px; box-sizing: border-box; }
        .btn { width: 100%; background: var(--primary); color: #020617; border: none; border-radius: 14px; padding: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-del { background: var(--error); color: white; width: auto; padding: 8px 12px; font-size: 12px; }
        .list-area { margin-top: 20px; max-height: 250px; overflow-y: auto; }
        .key-item { background: rgba(255, 255, 255, 0.03); border-radius: 16px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(12px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: rgba(30, 41, 59, 0.9); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 24px; padding: 30px; text-align: center; max-width: 300px; width: 85%; }
    </style>
</head>
<body>

<div id="loginWall" class="glass-panel">
    <h1>Vault Pro 🔐</h1>
    <p class="subtitle">解鎖您的加密保險箱</p>
    <input type="password" id="masterPass" class="input-box" placeholder="輸入主密碼">
    <button class="btn" onclick="authVault()">登入</button>
</div>

<div id="initWall" class="glass-panel">
    <h1>初始化 🛡️</h1>
    <p class="subtitle">設定保險箱主密碼</p>
    <input type="password" id="newPass" class="input-box" placeholder="新主密碼">
    <button class="btn" style="background: var(--success);" onclick="setupVault()">設定完成</button>
</div>

<div id="mainApp" class="glass-panel">
    <h1>管理面板</h1>
    <div style="display: flex; gap: 10px;">
        <select id="keyType" class="input-box" style="flex: 1;"><option value="API_KEY">API</option><option value="TOKEN">Token</option></select>
        <input type="text" id="keyName" class="input-box" style="flex: 2;" placeholder="名稱">
    </div>
    <input type="text" id="keyContent" class="input-box" placeholder="內容">
    <button class="btn" onclick="handleSave()">加密存儲</button>
    <div class="list-area" id="vaultList"></div>
    <button class="btn" style="background:none; color:#64748b; font-size:12px; margin-top:15px;" onclick="location.reload()">鎖定並登出</button>
</div>

<div id="modalOverlay"><div class="modal-box"><div id="mIcon" style="font-size: 3rem;"></div><h3 id="mTitle"></h3><p id="mDesc" style="color:#94a3b8;"></p><button class="btn" onclick="closeM()">確定</button></div></div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzjf3WJ1HCPWjl_wsXfI_0Q3j8mcKTPxU6ltv7lqoSIUA1DvGMq6nASFVwo7rHbRdxp/exec'; 
    let vaultData = [];
    let master = "";

    // 核心請求函數：使用簡單請求避開 CORS
    async function gasFetch(payload) {
        const params = new URLSearchParams();
        params.append('contents', JSON.stringify(payload));
        
        const res = await fetch(GAS_URL, {
            method: 'POST',
            body: params,
            redirect: 'follow'
        });
        const text = await res.text();
        try { return JSON.parse(text); } catch(e) { return text; }
    }

    function notify(type, title, desc, autoClose = false) {
        document.getElementById('mIcon').innerText = type === 'success' ? '✨' : '⚠️';
        document.getElementById('mTitle').innerText = title;
        document.getElementById('mDesc').innerText = desc;
        document.getElementById('modalOverlay').style.display = 'flex';
        if (autoClose) setTimeout(closeM, 1800);
    }
    function closeM() { document.getElementById('modalOverlay').style.display = 'none'; }

    const crypt = {
        enc: (t, p) => CryptoJS.AES.encrypt(t, p).toString(),
        dec: (c, p) => { try { return CryptoJS.AES.decrypt(c, p).toString(CryptoJS.enc.Utf8); } catch { return ""; } }
    };

    async function authVault() {
        const pass = document.getElementById('masterPass').value;
        try {
            vaultData = await gasFetch({ action: 'load' });
            const verify = vaultData.find(i => i.name === 'VERIFY_MARK');
            if (!verify) {
                document.getElementById('loginWall').style.display = 'none';
                document.getElementById('initWall').style.display = 'block';
            } else if (crypt.dec(verify.content, pass) === "OK") {
                master = pass;
                document.getElementById('loginWall').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                renderList();
            } else { notify('error', '錯誤', '密碼不正確'); }
        } catch (e) { notify('error', '網路失敗', '請確認 GAS 部署為「所有人」並使用無痕模式測試'); }
    }

    async function setupVault() {
        const pass = document.getElementById('newPass').value;
        await gasFetch({ action: 'save', type: 'SYS', name: 'VERIFY_MARK', content: crypt.enc("OK", pass) });
        notify('success', '初始化成功', '請重新登入', true);
        setTimeout(() => location.reload(), 2000);
    }

    async function handleSave() {
        const n = document.getElementById('keyName').value, c = document.getElementById('keyContent').value, t = document.getElementById('keyType').value;
        if (!n || !c) return notify('error', '缺失', '請填寫完整');
        await gasFetch({ action: 'save', type: t, name: n, content: crypt.enc(c, master) });
        notify('success', '同步中', '資料已加密存儲', true);
        setTimeout(async () => {
            vaultData = await gasFetch({ action: 'load' });
            renderList();
            document.getElementById('keyName').value = '';
            document.getElementById('keyContent').value = '';
        }, 1200);
    }

    async function delItem(id) {
        if (!confirm("確定要刪除嗎？")) return;
        await gasFetch({ action: 'delete', id: id });
        notify('success', '已刪除', '資料已移除', true);
        setTimeout(async () => {
            vaultData = await gasFetch({ action: 'load' });
            renderList();
        }, 1000);
    }

    function renderList() {
        const listDiv = document.getElementById('vaultList'); listDiv.innerHTML = '';
        vaultData.filter(i => i.type !== 'SYS').forEach(item => {
            const raw = crypt.dec(item.content, master);
            const div = document.createElement('div'); div.className = 'key-item';
            div.innerHTML = `<div><div style="font-size:10px; color:var(--primary); font-weight:bold;">${item.type}</div><div style="font-weight:600;">${item.name}</div></div>
                <div style="display:flex; gap:5px;"><button class="btn" onclick="navigator.clipboard.writeText('${raw}');notify('success','已複製','',true)" style="width:auto;padding:8px 12px;font-size:12px;">複製</button>
                <button class="btn btn-del" onclick="delItem('${item.id}')">刪除</button></div>`;
            listDiv.appendChild(div);
        });
    }
</script>
</body>
</html>
